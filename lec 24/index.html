<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            border: 2px solid black;
            padding: 20px;
            box-shadow: 3px 0px 10px 0px #464040;
        }
        .textshadow {
            text-shadow: 5px 2px 3px rgb(237, 237, 21);
            outline: 2px solid black;
            border-radius: 6px;
            outline-offset: 3px;
        }
    </style>
</head>
<body>
    <div class="box">
        I am a box
    </div>
    <p class="textshadow">
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Beatae aspernatur, voluptatibus labore ratione odio quo expedita velit delectus maxime doloremque nemo dicta iure, error molestias cupiditate inventore reiciendis officia repellendus harum fugit sit et.
    </p>
</body>
</html>
