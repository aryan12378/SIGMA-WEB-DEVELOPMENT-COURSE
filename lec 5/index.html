<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img height="400" width="500" src="image.png" alt="train image">
    <br>

    <table>
        <caption>Student details</caption>

        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>fav language</th>
            </tr>

        </thead>

        <tbody>
            <tr>
                <td>Aryan</td>
                <td>20</td>
                <td>Python</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="2">John</td>

                <td rowspan="2">JavaScript</td>

            <tr>
                <td>Tillu</td>
                <td>22</td>

            </tr>
        </tfoot>
    </table>

    <ul type="square">
        <li>Aryan</li>
        <li>Tillu</li>
        <li>chintu</li>
    </ul>

    <ol type="i">
        <li>Aryan</li>
        <li>Tillu</li>
        <li>chintu</li>
    </ol>

    <dl>
        <dt>HTML</dt>
        <dd>Hyper Text Markup Language</dd>
    </dl>
</body>

</html>
